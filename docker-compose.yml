services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warwick
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warwick"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - warwick_pgdata:/var/lib/postgresql/data

volumes:
  warwick_pgdata:

